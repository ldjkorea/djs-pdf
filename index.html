<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ'S PDF</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --main-bg: #1a1a1a; --accent: #d4af37; --text: #ffffff; }
        body { margin: 0; background: var(--main-bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* 시작 화면 */
        #welcome { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; text-align: center; 
        }
        .upload-btn {
            background: var(--accent); color: black; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; display: inline-block;
        }
        #file-input { display: none; }

        /* 뷰어 화면 */
        #viewer-container { display: none; height: 100vh; flex-direction: column; }
        header { 
            background: #252525; padding: 10px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid #333; z-index: 10;
        }
        #canvas-wrapper {
            flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start;
            touch-action: pan-x pan-y; /* 스와이프 스크롤 허용 */
        }
        #pdf-canvas { 
            transform-origin: top left;
        }
        .controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
                    display: flex; gap: 10px; background: rgba(0,0,0,0.7); padding: 10px; border-radius: 20px; z-index: 10;}
        button { background: #444; color: white; border: none; padding: 8px 15px; border-radius: 10px; font-size: 16px;}
    </style>
</head>
<body>

<div id="welcome">
    <h1 style="color: var(--accent);">DJ'S PDF</h1>
    <p>문서를 선택해 주세요</p>
    <label for="file-input" class="upload-btn">파일 선택하기</label>
    <input type="file" id="file-input" accept="application/pdf">
</div>

<div id="viewer-container">
    <header>
        <span id="page-info">1 / 1</span>
        <button onclick="location.reload()" style="background:none; color:var(--accent)">닫기</button>
    </header>
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>
    <div class="controls">
        <button id="prev">이전</button>
        <button id="next">다음</button>
        <button id="zoom-in">+</button>
        <button id="zoom-out">-</button>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null, pageNum = 1, scale = 1.0, canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvas-wrapper');

    // 파일 선택 로직 (가장 안정적인 방식)
    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && file.type === "application/pdf") {
            const reader = new FileReader();
            reader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                loadPDF(typedarray);
            };
            reader.readAsArrayBuffer(file);
        }
    });

    async function loadPDF(data) {
        pdfDoc = await pdfjsLib.getDocument(data).promise;
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('viewer-container').style.display = 'flex';
        
        // 모바일 화면에 맞게 초기 배율 최적화
        scale = window.innerWidth / 800; 
        if(scale < 0.6) scale = 0.6;
        renderPage(pageNum);
    }

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({scale: scale});
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        const renderContext = { canvasContext: ctx, viewport: viewport };
        await page.render(renderContext).promise;
        document.getElementById('page-info').textContent = `${num} / ${pdfDoc.numPages}`;
    }

    // 하단 버튼 컨트롤
    document.getElementById('prev').addEventListener('click', () => { if (pageNum <= 1) return; pageNum--; renderPage(pageNum); });
    document.getElementById('next').addEventListener('click', () => { if (pageNum >= pdfDoc.numPages) return; pageNum++; renderPage(pageNum); });
    document.getElementById('zoom-in').addEventListener('click', () => { scale += 0.2; renderPage(pageNum); });
    document.getElementById('zoom-out').addEventListener('click', () => { if (scale <= 0.5) return; scale -= 0.2; renderPage(pageNum); });

    // --- 핀치 줌 (두 손가락 확대/축소) 로직 추가 ---
    let initialDistance = 0;
    let currentVisualScale = 1;

    canvasWrapper.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault(); 
            initialDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
        }
    }, {passive: false});

    canvasWrapper.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const currentDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            currentVisualScale = currentDistance / initialDistance;
            // 움직이는 동안에는 화면만 임시로 확대/축소
            canvas.style.transform = `scale(${currentVisualScale})`;
        }
    }, {passive: false});

    canvasWrapper.addEventListener('touchend', (e) => {
        if (initialDistance > 0 && e.touches.length < 2) {
            // 손가락을 떼면 실제 배율을 변경하고 고화질로 새로고침
            scale *= currentVisualScale;
            
            if (scale < 0.5) scale = 0.5;
            if (scale > 4.0) scale = 4.0;

            canvas.style.transform = 'none'; 
            initialDistance = 0;
            currentVisualScale = 1;
            renderPage(pageNum); 
        }
    });

    // PWA 서비스 워커 등록
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW registration failed:', err));
        });
    }
</script>
</body>
</html>
