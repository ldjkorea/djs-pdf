<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DJ'S PDF</title>
    <link rel="manifest" href="/djs-pdf/manifest.json">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root { --main-bg: #1a1a1a; --accent: #d4af37; --text: #ffffff; }
        body { margin: 0; background: var(--main-bg); color: var(--text); font-family: sans-serif; overflow: hidden; touch-action: none; }
        
        /* 시작 화면 */
        #welcome { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; text-align: center; 
        }
        .upload-btn {
            background: var(--accent); color: black; padding: 15px 30px; 
            border-radius: 30px; font-weight: bold; cursor: pointer; display: inline-block;
        }
        #file-input { display: none; }

        /* 뷰어 화면 */
        #viewer-container { display: none; height: 100vh; flex-direction: column; }
        header { 
            background: #252525; padding: 10px 15px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px solid #333; z-index: 10;
        }
        .close-btn {
            background: none; border: none; color: var(--accent); font-size: 16px; font-weight: bold; padding: 5px; cursor: pointer;
        }
        #canvas-wrapper {
            flex: 1; 
            overflow: auto; 
            display: flex; 
            align-items: flex-start;
            touch-action: pan-x pan-y; 
        }
        #pdf-canvas { 
            /* 확대 기준점은 아래 스크립트에서 손가락 위치에 따라 동적으로 변합니다 */
            transform-origin: top left; 
        }
    </style>
</head>
<body>

<div id="welcome">
    <h1 style="color: var(--accent);">DJ'S PDF</h1>
    <p>문서를 선택해 주세요</p>
    <label for="file-input" class="upload-btn">파일 선택하기</label>
    <input type="file" id="file-input" accept="application/pdf">
</div>

<div id="viewer-container">
    <header>
        <span id="page-info">1 / 1</span>
        <button class="close-btn" onclick="location.reload()">닫기</button>
    </header>
    <div id="canvas-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfDoc = null, pageNum = 1, scale = 1.0, canvas = document.getElementById('pdf-canvas'), ctx = canvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvas-wrapper');

    document.getElementById('file-input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && file.type === "application/pdf") {
            const reader = new FileReader();
            reader.onload = function() {
                const typedarray = new Uint8Array(this.result);
                loadPDF(typedarray);
            };
            reader.readAsArrayBuffer(file);
        }
    });

    async function loadPDF(data) {
        pdfDoc = await pdfjsLib.getDocument(data).promise;
        document.getElementById('welcome').style.display = 'none';
        document.getElementById('viewer-container').style.display = 'flex';
        
        scale = window.innerWidth / 800; 
        if(scale < 0.6) scale = 0.6;
        if(scale > 1.5) scale = 1.5; 
        await renderPage(pageNum);
        canvasWrapper.scrollTop = 0;
        canvasWrapper.scrollLeft = 0;
    }

    async function renderPage(num) {
        const page = await pdfDoc.getPage(num);
        const viewport = page.getViewport({scale: scale});
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        const renderContext = { canvasContext: ctx, viewport: viewport };
        await page.render(renderContext).promise;
        document.getElementById('page-info').textContent = `${num} / ${pdfDoc.numPages}`;
    }

    // --- 핀치 줌 로직 (손가락 중심점 계산 및 스크롤 보정 추가) ---
    let initialDistance = 0;
    let currentVisualScale = 1;

    canvasWrapper.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault(); 
            initialDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );

            // 두 손가락의 정중앙 좌표를 계산하여 확대 기준점으로 설정
            const rect = canvas.getBoundingClientRect();
            const clientX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
            const clientY = (e.touches[0].clientY + e.touches[1].clientY) / 2;
            const originX = clientX - rect.left;
            const originY = clientY - rect.top;

            canvas.style.transformOrigin = `${originX}px ${originY}px`;
        }
    }, {passive: false});

    canvasWrapper.addEventListener('touchmove', (e) => {
        if (e.touches.length === 2) {
            e.preventDefault();
            const currentDistance = Math.hypot(
                e.touches[0].pageX - e.touches[1].pageX,
                e.touches[0].pageY - e.touches[1].pageY
            );
            currentVisualScale = currentDistance / initialDistance;
            canvas.style.transform = `scale(${currentVisualScale})`;
        }
    }, {passive: false});

    canvasWrapper.addEventListener('touchend', async (e) => {
        if (initialDistance > 0 && e.touches.length < 2) {
            const scaleRatio = currentVisualScale;
            scale *= currentVisualScale;
            if (scale < 0.3) scale = 0.3; 
            if (scale > 4.0) scale = 4.0; 

            canvas.style.transform = 'none'; 

            // 렌더링 전 화면 중심점 기억 (화면이 튀는 현상 방지)
            const wrapperRect = canvasWrapper.getBoundingClientRect();
            const centerX = canvasWrapper.scrollLeft + wrapperRect.width / 2;
            const centerY = canvasWrapper.scrollTop + wrapperRect.height / 2;

            initialDistance = 0;
            currentVisualScale = 1;

            await renderPage(pageNum); 

            // 화면 중심점도 확대 배율만큼 이동시켜 부드러운 스크롤 유지
            canvasWrapper.scrollLeft = (centerX * scaleRatio) - (wrapperRect.width / 2);
            canvasWrapper.scrollTop = (centerY * scaleRatio) - (wrapperRect.height / 2);
        }
    });

    // --- 스와이프 (책 넘기기) 로직 ---
    let touchStartX = 0;
    let touchEndX = 0;

    canvasWrapper.addEventListener('touchstart', e => {
        if (e.touches.length === 1) {
            touchStartX = e.touches[0].screenX;
        }
    }, {passive: true});

    canvasWrapper.addEventListener('touchend', e => {
        if (e.changedTouches.length === 1 && initialDistance === 0) {
            touchEndX = e.changedTouches[0].screenX;
            handleSwipe();
        }
    }, {passive: true});

    async function handleSwipe() {
        if (canvasWrapper.scrollWidth > canvasWrapper.clientWidth + 1) return;

        const swipeThreshold = 60; 
        const diff = touchStartX - touchEndX;

        if (diff > swipeThreshold) {
            if (pageNum < pdfDoc.numPages) {
                pageNum++;
                await renderPage(pageNum);
                // 페이지를 넘길 때만 스크롤을 맨 위 좌측으로 보냄
                canvasWrapper.scrollTop = 0;
                canvasWrapper.scrollLeft = 0;
            }
        } else if (diff < -swipeThreshold) {
            if (pageNum > 1) {
                pageNum--;
                await renderPage(pageNum);
                // 페이지를 넘길 때만 스크롤을 맨 위 좌측으로 보냄
                canvasWrapper.scrollTop = 0;
                canvasWrapper.scrollLeft = 0;
            }
        }
    }

    // PWA 서비스 워커 등록
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/djs-pdf/sw.js').catch(err => console.log('SW registration failed:', err));
        });
    }
</script>
</body>
</html>
