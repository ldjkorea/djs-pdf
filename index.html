<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<title>DJ'S PDF</title>
<link rel="manifest" href="/manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1e1e1e;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f0ede8;
  --muted: #6b6b6b;
  --accent: #c9a96e;
  --accent2: #e8d5b0;
  --red: #e05c5c;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── HEADER ── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  display: flex;
  align-items: center;
  height: 58px;
  gap: 14px;
  flex-shrink: 0;
  position: relative;
}

.logo {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--accent);
  letter-spacing: 0.04em;
  flex-shrink: 0;
}

.logo span {
  display: inline-block;
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
  margin-left: 2px;
  vertical-align: middle;
  margin-bottom: 3px;
}

.header-spacer { flex: 1; }

.icon-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  width: 40px; height: 40px;
  border-radius: 10px;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
}
.icon-btn:active, .icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface2); }
.icon-btn:disabled { opacity: 0.25; pointer-events: none; }

.open-btn {
  background: var(--accent);
  border: none;
  color: #0d0d0d;
  height: 40px;
  padding: 0 18px;
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 7px;
  transition: background 0.15s;
  flex-shrink: 0;
}
.open-btn:active { background: var(--accent2); }

#file-input { display: none; }

/* ── ZOOM PILL ── */
.zoom-pill {
  display: flex;
  align-items: center;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  height: 40px;
}
.zoom-pill button {
  background: none;
  border: none;
  color: var(--muted);
  width: 34px; height: 40px;
  font-size: 18px;
  cursor: pointer;
  transition: color 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.zoom-pill button:active { color: var(--text); }
.zoom-pill button:disabled { opacity: 0.25; pointer-events: none; }
.zoom-label {
  font-size: 12px;
  color: var(--muted);
  min-width: 40px;
  text-align: center;
  font-weight: 500;
  letter-spacing: 0.02em;
}

/* ── MAIN ── */
main {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  display: flex;
  flex-direction: column;
  align-items: center;
  scroll-behavior: smooth;
}

/* ── WELCOME ── */
#welcome {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  flex: 1;
  width: 100%;
  padding: 40px 32px;
  text-align: center;
}

.welcome-art {
  position: relative;
  width: 120px; height: 140px;
  margin-bottom: 36px;
}
.paper {
  position: absolute;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border2);
}
.paper-back {
  width: 88px; height: 112px;
  bottom: 0; right: 0;
  transform: rotate(6deg);
  background: var(--surface);
}
.paper-mid {
  width: 88px; height: 112px;
  bottom: 4px; left: 50%;
  transform: translateX(-50%) rotate(-3deg);
  background: var(--surface2);
}
.paper-front {
  width: 92px; height: 116px;
  bottom: 8px; left: 50%;
  transform: translateX(-50%);
  background: #1c1c1c;
  border-color: rgba(201,169,110,0.3);
  display: flex; flex-direction: column;
  padding: 18px 16px; gap: 8px;
  justify-content: center;
}
.paper-line {
  height: 3px;
  border-radius: 2px;
  background: rgba(201,169,110,0.25);
}
.paper-line.accent { background: rgba(201,169,110,0.6); width: 60%; }
.paper-line.short { width: 40%; }

.welcome-title {
  font-family: 'DM Serif Display', serif;
  font-size: 28px;
  color: var(--text);
  margin-bottom: 10px;
  letter-spacing: -0.01em;
}
.welcome-sub {
  font-size: 15px;
  color: var(--muted);
  line-height: 1.6;
  margin-bottom: 32px;
}
.welcome-cta {
  background: var(--accent);
  border: none;
  color: #0d0d0d;
  height: 52px;
  padding: 0 32px;
  border-radius: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  transition: all 0.15s;
  letter-spacing: 0.01em;
}
.welcome-cta:active { transform: scale(0.97); background: var(--accent2); }

/* ── LOADING ── */
#loading {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  flex: 1;
  color: var(--muted);
  font-size: 14px;
  letter-spacing: 0.04em;
}
.loader {
  width: 36px; height: 36px;
  border: 2px solid var(--surface2);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── CANVAS AREA ── */
#canvas-wrap {
  display: none;
  flex-direction: column;
  align-items: center;
  padding: 20px 12px 20px;
  width: 100%;
}

canvas {
  background: #fff;
  border-radius: 6px;
  box-shadow: 0 2px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.04);
  max-width: 100%;
  display: block;
}

/* ── FOOTER ── */
footer {
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding: 0 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
  flex-shrink: 0;
  gap: 12px;
}

.nav-btn {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  width: 52px; height: 52px;
  border-radius: 14px;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.nav-btn:active { background: rgba(201,169,110,0.15); border-color: rgba(201,169,110,0.4); color: var(--accent); }
.nav-btn:disabled { opacity: 0.2; pointer-events: none; }

.page-display {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.page-current {
  font-family: 'DM Serif Display', serif;
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
}
.page-total {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* ── TOAST ── */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 10px 20px;
  border-radius: 24px;
  font-size: 13px;
  opacity: 0;
  transition: all 0.25s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 999;
  letter-spacing: 0.02em;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
#toast.error { border-color: rgba(224,92,92,0.5); color: var(--red); }

/* ── SCROLLBAR ── */
main::-webkit-scrollbar { width: 3px; }
main::-webkit-scrollbar-track { background: transparent; }
main::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">DJ'S PDF<span></span></div>
  <div class="header-spacer"></div>

  <div class="zoom-pill" id="zoom-pill" style="display:none">
    <button id="zoom-out" title="축소">−</button>
    <span class="zoom-label" id="zoom-label">100%</span>
    <button id="zoom-in" title="확대">+</button>
  </div>

  <div style="position:relative; flex-shrink:0;">
    <div class="open-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      열기
    </div>
    <input type="file" id="file-input" accept=".pdf" style="position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;">
  </div>

  <button class="icon-btn" id="btn-close" disabled title="닫기">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
</header>

<main>
  <div id="welcome">
    <div class="welcome-art">
      <div class="paper paper-back"></div>
      <div class="paper paper-mid"></div>
      <div class="paper paper-front">
        <div class="paper-line accent"></div>
        <div class="paper-line"></div>
        <div class="paper-line"></div>
        <div class="paper-line short"></div>
        <div class="paper-line"></div>
        <div class="paper-line accent" style="width:75%"></div>
        <div class="paper-line short"></div>
      </div>
    </div>
    <h1 class="welcome-title">읽고 싶은 PDF를<br>불러오세요</h1>
    <p class="welcome-sub">파일은 기기 내에서만 처리되며<br>외부로 전송되지 않습니다</p>
    <div style="position:relative; margin-top:8px;">
      <div class="welcome-cta">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        파일 선택
      </div>
      <input type="file" accept=".pdf" style="position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;" onchange="handleFile(this)">
    </div>
  </div>

  <div id="loading">
    <div class="loader"></div>
    <span>불러오는 중</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="pdf-canvas"></canvas>
  </div>
</main>

<footer>
  <button class="nav-btn" id="btn-prev" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div class="page-display">
    <div class="page-current" id="page-current">—</div>
    <div class="page-total" id="page-total">페이지</div>
  </div>

  <button class="nav-btn" id="btn-next" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</footer>

<div id="toast"></div>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfDoc = null, cur = 1, scale = 1;
const SCALES = [0.5, 0.6, 0.75, 1, 1.25, 1.5, 2];
let scaleIdx = 3;

const canvas = document.getElementById('pdf-canvas');
const ctx = canvas.getContext('2d');
const welcome = document.getElementById('welcome');
const loading = document.getElementById('loading');
const wrap = document.getElementById('canvas-wrap');
const pageCur = document.getElementById('page-current');
const pageTotal = document.getElementById('page-total');
const btnPrev = document.getElementById('btn-prev');
const btnNext = document.getElementById('btn-next');
const btnClose = document.getElementById('btn-close');
const fileInput = document.getElementById('file-input');
const zoomPill = document.getElementById('zoom-pill');
const zoomLabel = document.getElementById('zoom-label');
const zoomIn = document.getElementById('zoom-in');
const zoomOut = document.getElementById('zoom-out');
const toast = document.getElementById('toast');

let toastTimer;
function showToast(msg, isErr) {
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'show' + (isErr ? ' error' : '');
  toastTimer = setTimeout(() => toast.className = '', 2800);
}

function setView(mode) {
  welcome.style.display = mode === 'welcome' ? 'flex' : 'none';
  loading.style.display = mode === 'loading' ? 'flex' : 'none';
  wrap.style.display = mode === 'canvas' ? 'flex' : 'none';
  zoomPill.style.display = mode === 'canvas' ? 'flex' : 'none';
}

async function loadPDF(ab) {
  setView('loading');
  try {
    pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
    cur = 1; updateNav();
    await render(cur);
    setView('canvas');
    btnClose.disabled = false;
    showToast(`총 ${pdfDoc.numPages}페이지`);
  } catch {
    setView('welcome');
    showToast('열 수 없는 파일입니다', true);
  }
}

async function render(n) {
  const page = await pdfDoc.getPage(n);
  scale = SCALES[scaleIdx];
  const vp = page.getViewport({ scale });
  canvas.width = vp.width;
  canvas.height = vp.height;
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  pageCur.textContent = n;
  pageTotal.textContent = `/ ${pdfDoc.numPages}`;
  zoomLabel.textContent = Math.round(scale * 100) + '%';
  zoomOut.disabled = scaleIdx === 0;
  zoomIn.disabled = scaleIdx === SCALES.length - 1;
  wrap.scrollTop = 0;
  main.scrollTop = 0;
}

function updateNav() {
  btnPrev.disabled = cur <= 1;
  btnNext.disabled = cur >= pdfDoc.numPages;
}

btnPrev.addEventListener('click', async () => { if (cur > 1) { cur--; updateNav(); await render(cur); } });
btnNext.addEventListener('click', async () => { if (cur < pdfDoc.numPages) { cur++; updateNav(); await render(cur); } });

zoomIn.addEventListener('click', async () => { if (scaleIdx < SCALES.length-1) { scaleIdx++; await render(cur); } });
zoomOut.addEventListener('click', async () => { if (scaleIdx > 0) { scaleIdx--; await render(cur); } });

btnClose.addEventListener('click', () => {
  pdfDoc = null; cur = 1;
  pageCur.textContent = '—'; pageTotal.textContent = '페이지';
  btnPrev.disabled = btnNext.disabled = btnClose.disabled = true;
  fileInput.value = '';
  setView('welcome');
});

function handleFile(input) {
  const f = input.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => loadPDF(ev.target.result);
  r.readAsArrayBuffer(f);
}

fileInput.addEventListener('change', e => handleFile(e.target));

const main = document.querySelector('main');

// ── 터치 제스처 (스와이프 + 핀치 줌) ──
let touchX = 0, pinching = false, pinchStartDist = 0, pinchStartIdx = 3;

function getTouchDist(e) {
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  return Math.sqrt(dx*dx + dy*dy);
}

canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    pinching = true;
    pinchStartDist = getTouchDist(e);
    pinchStartIdx = scaleIdx;
  } else {
    pinching = false;
    touchX = e.touches[0].clientX;
  }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
  if (!pinching || e.touches.length < 2) return;
  const dist = getTouchDist(e);
  const ratio = dist / pinchStartDist;
  // CSS transform으로 실시간 미리보기 (부드럽게)
  canvas.style.transformOrigin = 'center center';
  canvas.style.transform = `scale(${Math.max(0.5, Math.min(3, ratio))})`;
}, { passive: true });

canvas.addEventListener('touchend', async e => {
  if (pinching) {
    const finalScale = parseFloat(canvas.style.transform.replace('scale(','')) || 1);
    canvas.style.transform = '';
    // 실제 배율로 스냅
    const targetScale = SCALES[pinchStartIdx] * finalScale;
    let bestIdx = 0;
    let bestDiff = Infinity;
    SCALES.forEach((s, i) => {
      const diff = Math.abs(s - targetScale);
      if (diff < bestDiff) { bestDiff = diff; bestIdx = i; }
    });
    if (bestIdx !== scaleIdx) {
      scaleIdx = bestIdx;
      await render(cur);
      showToast(Math.round(SCALES[scaleIdx] * 100) + '%');
    }
    pinching = false;
    return;
  }
  // 스와이프 (손가락 1개)
  const dx = e.changedTouches[0].clientX - touchX;
  if (Math.abs(dx) > 60) {
    if (dx < 0 && cur < pdfDoc.numPages) { cur++; updateNav(); render(cur); }
    if (dx > 0 && cur > 1) { cur--; updateNav(); render(cur); }
  }
}, { passive: true });

// File Handling API
if ('launchQueue' in window) {
  window.launchQueue.setConsumer(async lp => {
    if (!lp.files.length) return;
    const f = await lp.files[0].getFile();
    const r = new FileReader();
    r.onload = ev => loadPDF(ev.target.result);
    r.readAsArrayBuffer(f);
  });
}
</script>
</body>
</html>
